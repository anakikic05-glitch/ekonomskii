<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lekcija 1</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
}

.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  background: rgba(255,255,255,0.05);
}

.btn {
  background: linear-gradient(135deg, #38bdf8, #6366f1);
  border: none;
  padding: 10px 20px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  margin: 5px;
}

.container {
  padding: 20px;
  max-width: 700px;
  margin: auto;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  margin-top: 20px;
}

.answers button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  transition: 0.2s;
}
.correct {
  background: #22c55e !important;
}

.wrong {
  background: #ef4444 !important;
}
.selected {
  background: #ef4444;
  opacity: 0.8;
}

.hidden {
  display: none;
}

.review {
  margin-top: 20px;
  text-align: left;
}

.review div {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="navbar">
  <button class="btn" onclick="nazad()">← Lekcije</button>
  <div>Lekcija 1</div>
</div>

<div class="container">

  <div id="mode">
    <h2>Izaberi način rada</h2>
    <button class="btn" onclick="start('test')">Test</button>
    <button class="btn" onclick="start('learn')">Učenje</button>
  </div>

  <div id="quiz" class="hidden">
    <div class="card">
      <h3 id="question"></h3>
      <div class="answers" id="answers"></div>
    </div>
    <button class="btn" onclick="next()">Sljedeće</button>
  </div>

  <div id="result" class="hidden">
    <h2 id="score"></h2>
    <div class="review" id="review"></div>
    <button class="btn" onclick="restart()">Ponovi</button>
    <button class="btn" onclick="nextLesson()">Sljedeća lekcija</button>
  </div>

</div>

<script>

let modeType = "";
let current = 0;
let score = 0;
let mistakes = [];

const pitanja = [
  { p:"Sklonost podvrgavanja pravilima i oblicima ponašanja grupe kojoj pripadamo naziva se:", a:["ksenofobija","mizoginija","konformizam","gregarizam"], t:2 },

  { p:"Životni i moralni stav čiji se smisao odnosi na življenje u odricanju od zadovoljstva jeste:", a:["etatizam","asketizam","animizam","incest"], t:1 },

  { p:"Stopa nataliteta predstavlja:", a:["broj iseljenih na 1000 stanovnika","broj useljenih na 1000 stanovnika","broj rođenih na 1000 stanovnika","broj umrlih na 1000 stanovnika"], t:2 },

  { p:"Pod pojmom „Brettonvudski blizanci“ podrazumijevaju se:", a:["Svjetska banka i Međunarodni monetarni fond","Međunarodni monetarni fond i Evropska centralna banka","Evropska centralna banka i Svjetska banka","Evropska banka za obnovu i razvoj i Međunarodni monetarni fond"], t:0 },

  { p:"Organizacije i/ili pojedinci koji svojim aktivnostima pokušavaju da utiču na odluke vlasti i pridobiju političare za svoje stavove, nazivaju se:", a:["lobisti","masoni","mobisti","opozicija"], t:0 },

  { p:"Zagovornik „najbolje“, „idealne“, odnosno pravedne države iz antičkog vremena je:", a:["Sokrat","Platon","Aristotel","Epikur"], t:1 },

  { p:"Mjerna jedinica za magnetnu indukciju je:", a:["Tesla","Om","Veber","ništa od navedenog"], t:0 },

  { p:"Starosjedioci Srednje i Južne Amerike bili su:", a:["Aboridžini i Bušmani","Inke i Maje","Sijuksi i Komanči","Aleuti i Burjati"], t:1 },

  { p:"Djelo „Ana Karenjina“ napisao je:", a:["Ivan Sergejevič Turgenjev","Lav Nikolajevič Tolstoj","Fjodor Mihajlovič Dostojevski","Mihail Aleksandrovič Šolohov"], t:1 },

  { p:"Koje od navedenih djela nije napisao Fjodor M. Dostojevski:", a:["Zločin i kazna","Idiot","Braća Karamazovi","Rat i mir"], t:3 },

  { p:"Embargo je:", a:["vrsta zabrane","vrsta dozvole","vrsta saradnje","vrsta trgovine"], t:0 },

  { p:"Izvori vrele vode i pare koja povremeno pod pritiskom izbijaju iz Zemljine unutrašnjosti nazivaju se:", a:["vulkani","vodoskoci","vodo-vulkani","gejziri"], t:3 },

  { p:"Cijena nafte se izražava u:", a:["barelima","litrima","galonima","ništa od navedenog"], t:0 },

  { p:"Galaksija u kojoj se nalazi Solarni sistem naziva se:", a:["Andromeda","Pegaz","Persej","Mlijecni put"], t:3 },

  { p:"Atomske bombe bačene su na Hirošimu i Nagasaki u avgustu:", a:["1942. godine","1943. godine","1944. godine","1945. godine"], t:3 },

  { p:"Nauka o stanovništvu naziva se:", a:["etnologija","demografija","humanologija","etnografija"], t:1 },

  { p:"Nagrada Zlatna palma (franc. Palme d'Or) na festivalu u Kanu u Franscuskoj, dodjeljuje se za:", a:["najbolje književno djelo","najbolju inovaciju","najbolji film","ništa od navedenog"], t:2 },

  { p:"Oblast filozofije koja se bavi znanjem tj. koja istražuje mogućnosti, prirodu i granice ljudskog saznanja, naziva se:", a:["didaktika","epistemologija","kompetencija","logika"], t:1 },

  { p:"Bermudski trougao se nalazi u:", a:["Tihom okeanu","Atlantskom okeanu","Indijskom okeanu","Sjevernom ledenom okeanu"], t:1 },

  { p:"Ksenofobija se odnosi na:", a:["strah i nepovjerenje prema strancima","strah od otvorenog prostora","strah od visine","strah od zatvorenog i skučenog prostora"], t:0 }
];
function start(m){
  modeType = m;
  document.getElementById("mode").style.display="none";
  document.getElementById("quiz").style.display="block";
  show();
}

function show(){
  let q = pitanja[current];
  document.getElementById("question").innerText = q.p;

  let ans = document.getElementById("answers");
  ans.innerHTML = "";

  q.izabrano = null;

  q.a.forEach((odg,i)=>{
    let btn = document.createElement("button");
    btn.innerText = odg;

    btn.onclick = () => {

  document.querySelectorAll(".answers button")
    .forEach(b => b.classList.remove("selected", "correct", "wrong"));

  btn.classList.add("selected");

  q.izabrano = i;

  // 🔥 SAMO ZA UČENJE MODE
  if (modeType === "learn") {

    if (i === q.t) {
      btn.classList.add("correct"); // zeleno
    } else {
      btn.classList.add("wrong"); // crveno

      // pokaži i tačan odgovor zeleno
      document.querySelectorAll(".answers button")[q.t]
        .classList.add("correct");
    }
  }
};

    ans.appendChild(btn);
  });
}

function next(){
  let q = pitanja[current];

  if(q.izabrano === q.t){
    score++;
  } else {
    mistakes.push({pitanje:q.p, tacan:q.a[q.t]});
  }

  current++;

  if(current < pitanja.length){
    show();
  } else {
    showResult();
  }
}

function showResult(){
  document.getElementById("quiz").style.display="none";
  document.getElementById("result").style.display="block";

  document.getElementById("score").innerText =
    "Rezultat: " + score + "/" + pitanja.length;

  let review = document.getElementById("review");
  review.innerHTML = "<h3>Greške:</h3>";

  if(mistakes.length === 0){
    review.innerHTML += "<p>Sve tačno 🎉</p>";
  } else {
    mistakes.forEach(m=>{
      review.innerHTML += `
        <div>
          <b>Pitanje:</b> ${m.pitanje}<br>
          <b>Tačan odgovor:</b> ${m.tacan}
        </div>
      `;
    });
  }
}

function restart(){
  current=0;
  score=0;
  mistakes=[];
  document.getElementById("result").style.display="none";
  document.getElementById("mode").style.display="block";
}

function nazad(){
  window.location.href="pocetna.html";
}

function nextLesson(){
  alert("Sljedeća lekcija uskoro 😄");
}

</script>

</body>
</html>
