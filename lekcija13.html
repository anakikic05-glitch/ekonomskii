<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lekcija 1</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
}

.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  background: rgba(255,255,255,0.05);
}

.btn {
  background: linear-gradient(135deg, #38bdf8, #6366f1);
  border: none;
  padding: 10px 20px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  margin: 5px;
}

.container {
  padding: 20px;
  max-width: 700px;
  margin: auto;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  margin-top: 20px;
}

.answers button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  transition: 0.2s;
}
.correct {
  background: #22c55e !important;
}

.wrong {
  background: #ef4444 !important;
}
.selected {
  background: #ef4444;
  opacity: 0.8;
}

.hidden {
  display: none;
}

.review {
  margin-top: 20px;
  text-align: left;
}

.review div {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="navbar">
  <button class="btn" onclick="nazad()">← Lekcije</button>
  <div>Lekcija 1</div>
</div>

<div class="container">

  <div id="mode">
    <h2>Izaberi način rada</h2>
    <button class="btn" onclick="start('test')">Test</button>
    <button class="btn" onclick="start('learn')">Učenje</button>
  </div>

  <div id="quiz" class="hidden">
    <div class="card">
      <h3 id="question"></h3>
      <div class="answers" id="answers"></div>
    </div>
    <button class="btn" onclick="next()">Sljedeće</button>
  </div>

  <div id="result" class="hidden">
    <h2 id="score"></h2>
    <div class="review" id="review"></div>
    <button class="btn" onclick="restart()">Ponovi</button>
    <button class="btn" onclick="nextLesson()">Sljedeća lekcija</button>
  </div>

</div>

<script>

let modeType = "";
let current = 0;
let score = 0;
let mistakes = [];
  const pitanja = [

  { p:"Maksimizacija profita preduzeća u kratkom roku podrazumijeva:", a:[
    "jednakost marginalnih prihoda i marginalnih troškova",
    "jednakost marginalnih prihoda i prosječnih troškova",
    "jednakost prosječnih prihoda i marginalnih troškova",
    "jednakost prosječnih prihoda i prosječnih troškova"
  ], t:0 },

  { p:"Fiksni trošak predstavlja vrstu troška koji se:", a:[
    "mijenja sa promjenom obima roizvodnje",
    "ne mijenja sa promjenom obima proizvodnje",
    "mijenja sa promjenom količine rada",
    "ne mijenja sa promjenom količine rada"
  ], t:1 },

  { p:"Koji od navedenih međunarodnih standarda se odnosi na sistem upravljanja kvalitetom:", a:[
    "ISO 18000",
    "ISO 9000",
    "ISO 14000",
    "ISO 26000"
  ], t:1 },

  { p:"Izdavaoci obveznica se nazivaju:", a:[
    "emitenti",
    "garanti",
    "jemci",
    "špekulanti"
  ], t:0 },

  { p:"Aukcija je:", a:[
    "povećanje vrijednosti valute",
    "oblik preuzimanja preduzeća",
    "javna prodaja robe putem licitacije",
    "ništa od navedenog"
  ], t:2 },

  { p:"Naknada za usluge koja je obračunata u procentu od vrijednosti obavljenog posla naziva se:", a:[
    "kamata",
    "akontacija",
    "provizija",
    "avans"
  ], t:2 },

  { p:"Ko je isticao ideju da ljudi imaju neotuđiva prava samim tim što su ljudska bića:", a:[
    "Džejms Medison",
    "Tomas Hobs",
    "Džon Loks",
    "Emanuel Kant"
  ], t:0 },

  { p:"Rabat je:", a:[
    "stopa poreza",
    "popust u cijeni robe",
    "uplata unaprijed",
    "povrat robe"
  ], t:1 },

  { p:"Trezorski zapisi Republike Srpske prodaju se:", a:[
    "na šalteru Investiciono-razvojne banke Republike Srpske",
    "na Banjalučkoj berzi",
    "u Komisiji za hartije od vrijednosti Republike Srpske",
    "u Narodnoj skupštini Republike Srpske"
  ], t:1 },

  { p:"Laferova kriva prikazuje odnos:", a:[
    "stope inflacije i stope nezaposlenosti",
    "poreske stope i poreskih prihoda",
    "stope inflacije i poreskih prihoda",
    "poreske stope i stope inflacije"
  ], t:1 },

  { p:"Grejs period je:", a:[
    "period do otpočinjanja otplate kredita",
    "ukupan period otplate kredita",
    "period u kome se plaća kredit",
    "ništa od navedenog"
  ], t:0 },

  { p:"Akvizicija je proces:", a:[
    "razdvajanja preduzeća",
    "spajanja preduzeća",
    "stečaja preduzeća",
    "likvidacije preduzeća"
  ], t:1 },

  { p:"Institucija EU koja određuje šta čini preduzeće malim, srednjim ili velikim preduzećem je:", a:[
    "Evropsko vijeće",
    "Evropska centralna banka",
    "Evropski investicioni fond",
    "Evropska komisija"
  ], t:3 },

  { p:"Proporcionalni varijabilni troškovi su:", a:[
    "varijabilni troškovi koji ne rastu srazmjerno sa rastom obima proizvodnje",
    "varijabilni troškovi koji ne rastu srazmjerno sa rastom obima prodaje",
    "varijabilni troškovi koji rastu srazmjerno sa rastom obima proizvodnje",
    "varijabilni troškovi koji rastu srazmjerno sa rastom obima prodaje"
  ], t:2 },

  { p:"Pravne forme organizovanja biznisa u RS su definisane sljedećim zakonima:", a:[
    "Zakonom o privrednim društvima i Zakonom o razvoju MSP",
    "Zakonom o zanatsko-preduzetničkoj djelatnosti i Zakonom o poslovnim društvima",
    "Zakonom o zanatsko-preduzetničkoj djelatnosti i Zakonom o razvoju MSP",
    "Zakonom o privrednim društvima i Zakonom o zanatsko-preduzetničkoj djelatnosti"
  ], t:3 },

  { p:"Pravno ili fizičko lice koje vrši isporuku robe kupcima naziva se:", a:[
    "deponent",
    "koncesionar",
    "cesionar",
    "dobavljač"
  ], t:3 },

  { p:"U Republici Srpskoj postoji:", a:[
    "jedan javni univerzitet",
    "dva javna univerziteta",
    "tri javna univerziteta",
    "četiri javna univerziteta"
  ], t:1 },

  { p:"SAP je prepoznatljiv prvenstveno kao:", a:[
    "programski jezik",
    "vodeće integrisano softversko rješenje (eng. ERP)",
    "računovodstveni softver za mala preduzeća",
    "softver za ekonomska planiranja javnog sektora"
  ], t:1 },

  { p:"Profit koji ostvare samostalni preduzetnici u Republici Srpskoj oporezuje se po osnovu:", a:[
    "Zakona o porezu na dodatu vrijednost",
    "Zakona o porezu na dobit",
    "Zakona o porezu na dohodak",
    "Zakona o porezu na prihod"
  ], t:2 },

  { p:"Dokument kojim se garantuje da roba ima ona tehnološka i druga svojstva koja kupci očekuju ili su predviđena odgovarajućim standardima naziva se:", a:[
    "avans",
    "anuitet",
    "atest",
    "ništa od navedenog"
  ], t:2 }

];
function start(m){
  modeType = m;
  document.getElementById("mode").style.display="none";
  document.getElementById("quiz").style.display="block";
  show();
}

function show(){
  let q = pitanja[current];
  document.getElementById("question").innerText = q.p;

  let ans = document.getElementById("answers");
  ans.innerHTML = "";

  q.izabrano = null;

  q.a.forEach((odg,i)=>{
    let btn = document.createElement("button");
    btn.innerText = odg;

    btn.onclick = () => {

  document.querySelectorAll(".answers button")
    .forEach(b => b.classList.remove("selected", "correct", "wrong"));

  btn.classList.add("selected");

  q.izabrano = i;

  // 🔥 SAMO ZA UČENJE MODE
  if (modeType === "learn") {

    if (i === q.t) {
      btn.classList.add("correct"); // zeleno
    } else {
      btn.classList.add("wrong"); // crveno

      // pokaži i tačan odgovor zeleno
      document.querySelectorAll(".answers button")[q.t]
        .classList.add("correct");
    }
  }
};

    ans.appendChild(btn);
  });
}

function next(){
  let q = pitanja[current];

  if(q.izabrano === q.t){
    score++;
  } else {
    mistakes.push({pitanje:q.p, tacan:q.a[q.t]});
  }

  current++;

  if(current < pitanja.length){
    show();
  } else {
    showResult();
  }
}

function showResult(){
  document.getElementById("quiz").style.display="none";
  document.getElementById("result").style.display="block";

  document.getElementById("score").innerText =
    "Rezultat: " + score + "/" + pitanja.length;

  let review = document.getElementById("review");
  review.innerHTML = "<h3>Greške:</h3>";

  if(mistakes.length === 0){
    review.innerHTML += "<p>Sve tačno 🎉</p>";
  } else {
    mistakes.forEach(m=>{
      review.innerHTML += `
        <div>
          <b>Pitanje:</b> ${m.pitanje}<br>
          <b>Tačan odgovor:</b> ${m.tacan}
        </div>
      `;
    });
  }
}

function restart(){
  current=0;
  score=0;
  mistakes=[];
  document.getElementById("result").style.display="none";
  document.getElementById("mode").style.display="block";
}

function nazad(){
  window.location.href="pocetna.html";
}

function nextLesson(){
  alert("Sljedeća lekcija uskoro 😄");
}

</script>

</body>
</html>
