<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lekcija 1</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
}

.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  background: rgba(255,255,255,0.05);
}

.btn {
  background: linear-gradient(135deg, #38bdf8, #6366f1);
  border: none;
  padding: 10px 20px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  margin: 5px;
}

.container {
  padding: 20px;
  max-width: 700px;
  margin: auto;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  margin-top: 20px;
}

.answers button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  transition: 0.2s;
}
.correct {
  background: #22c55e !important;
}

.wrong {
  background: #ef4444 !important;
}
.selected {
  background: #ef4444;
  opacity: 0.8;
}

.hidden {
  display: none;
}

.review {
  margin-top: 20px;
  text-align: left;
}

.review div {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="navbar">
  <button class="btn" onclick="nazad()">← Lekcije</button>
  <div>Lekcija 1</div>
</div>

<div class="container">

  <div id="mode">
    <h2>Izaberi način rada</h2>
    <button class="btn" onclick="start('test')">Test</button>
    <button class="btn" onclick="start('learn')">Učenje</button>
  </div>

  <div id="quiz" class="hidden">
    <div class="card">
      <h3 id="question"></h3>
      <div class="answers" id="answers"></div>
    </div>
    <button class="btn" onclick="next()">Sljedeće</button>
  </div>

  <div id="result" class="hidden">
    <h2 id="score"></h2>
    <div class="review" id="review"></div>
    <button class="btn" onclick="restart()">Ponovi</button>
    <button class="btn" onclick="nextLesson()">Sljedeća lekcija</button>
  </div>

</div>

<script>

let modeType = "";
let current = 0;
let score = 0;
let mistakes = [];


 const pitanja = [
  { p:"Antički Herculaneum (lat. Herculaneum) uništen je 79. godine n.e. zbog:", a:["erupcije vulkana","požara","najave Huna","zemljotresa"], t:0 },

  { p:"Perfidna osoba je:", a:["lakoumna","lakoma","mudra","podmukla"], t:3 },

  { p:"Semantika je:", a:["poglavlje u knjizi","nauka o egzistenciji","dio filozofske nauke","nauka koja izučava značenje riječi, fraza i rečenica"], t:3 },

  { p:"Aproksimativno znači:", a:["beskonačno","neodređeno","sasvim suprotno","približno"], t:3 },

  { p:"Pripadnici organizovanog pokreta „Slobodni zidari“ nazivaju se:", a:["lobisti","masoni","elitisti","ništa od navedenog"], t:1 },

  { p:"Povelja Kulina bana, sačinjena 1189. godine na latinskom i na narodnom srpskom jeziku, predstavljala je sporazum o slobodnoj trgovini sa:", a:["Venecijom","Dubrovačkom Republikom","Ugarskom","Srbijom"], t:1 },

  { p:"Prvi čovjek univerziteta je:", a:["dekan","prorektor","rektor","prodekan"], t:2 },

  { p:"Savjet bezbjednosti je organ:", a:["Svjetske trgovinske organizacije","NATO-a","Ujedinjenih nacija","zemalja izvoznica nafte"], t:2 },

  { p:"Grupa država koju čine Kina, Indija, Rusija, Brazil i Južnoafrička Republika, popularno se naziva:", a:["BRIKS zemlje","BIRKS zemlje","KIRBS zemlje","ne postoji takva skraćenica"], t:0 },

  { p:"Marija Kiri je jedina žena dobitnica dvije Nobelove nagrade:", a:["iz fizike i hemije","iz matematike i fizike","iz medicine i radiologije","iz fizike i nuklearne medicine"], t:0 },

  { p:"Ratifikacija generalno označava:", a:["odbijanje","neutralnost","prihvatanje","neobaveznost"], t:2 },

  { p:"Ko je altruist?", a:["nesebičan čovjek - čovjekoljubac","bolestan čovjek","sebična osoba","pračovjek"], t:0 },

  { p:"Zemlje Beneluksa čine:", a:["Belgija i Luksemburg","Letonija, Litvanija i Estonija","Belgija, Luksemburg i Holandija","Belgija i Njemačka"], t:2 },

  { p:"Parlament BiH se sastoji od:", a:["Doma naroda i Kluba naroda","Vijeća naroda i Vijeća ministara","Doma naroda i Predstavničkog doma","Predstavničkog doma i Vijeća ministara"], t:2 },

  { p:"Slapovi Krupe se nalaze u:", a:["Republici Srpskoj","Hrvatskoj","Srbiji","Crnoj Gori"], t:0 },

  { p:"Stručnu ocjenu naučnog ili umjetničkog djela daje:", a:["revizor","restaurator","receptor","recenzent"], t:3 },

  { p:"Izraz „Pirova pobjeda“ znači:", a:["lako ostvarena pobjeda","pobjeda ostvarena uz velike žrtve","pobjeda na poene","ubjedljiva pobjeda"], t:1 },

  { p:"Literarni lik, grof Drakula, zasnovan je na stvarnom evropskom vladaru pod nazivom:", a:["Ričard lavlje srce","Ivan Grozni","Luj XV","Vladislav Tepeš"], t:3 },

  { p:"Crkva Svete Sofije u Carigradu / Konstantinopolju (današnji Istanbul) podignuta je u VI vijeku za vrijeme vladavine cara:", a:["Konstantina Velikog","Dioklecijana","Justinijana I","Hadrijana"], t:2 },

  { p:"Engleska skraćenica za Međunarodni dječiji fond Ujedinjenih Nacija je:", a:["UNHCR","UNATRA","AID","UNICEF"], t:3 }
];
function start(m){
  modeType = m;
  document.getElementById("mode").style.display="none";
  document.getElementById("quiz").style.display="block";
  show();
}

function show(){
  let q = pitanja[current];
  document.getElementById("question").innerText = q.p;

  let ans = document.getElementById("answers");
  ans.innerHTML = "";

  q.izabrano = null;

  q.a.forEach((odg,i)=>{
    let btn = document.createElement("button");
    btn.innerText = odg;

    btn.onclick = () => {

  document.querySelectorAll(".answers button")
    .forEach(b => b.classList.remove("selected", "correct", "wrong"));

  btn.classList.add("selected");

  q.izabrano = i;

  // 🔥 SAMO ZA UČENJE MODE
  if (modeType === "learn") {

    if (i === q.t) {
      btn.classList.add("correct"); // zeleno
    } else {
      btn.classList.add("wrong"); // crveno

      // pokaži i tačan odgovor zeleno
      document.querySelectorAll(".answers button")[q.t]
        .classList.add("correct");
    }
  }
};

    ans.appendChild(btn);
  });
}

function next(){
  let q = pitanja[current];

  if(q.izabrano === q.t){
    score++;
  } else {
    mistakes.push({pitanje:q.p, tacan:q.a[q.t]});
  }

  current++;

  if(current < pitanja.length){
    show();
  } else {
    showResult();
  }
}

function showResult(){
  document.getElementById("quiz").style.display="none";
  document.getElementById("result").style.display="block";

  document.getElementById("score").innerText =
    "Rezultat: " + score + "/" + pitanja.length;

  let review = document.getElementById("review");
  review.innerHTML = "<h3>Greške:</h3>";

  if(mistakes.length === 0){
    review.innerHTML += "<p>Sve tačno 🎉</p>";
  } else {
    mistakes.forEach(m=>{
      review.innerHTML += `
        <div>
          <b>Pitanje:</b> ${m.pitanje}<br>
          <b>Tačan odgovor:</b> ${m.tacan}
        </div>
      `;
    });
  }
}

function restart(){
  current=0;
  score=0;
  mistakes=[];
  document.getElementById("result").style.display="none";
  document.getElementById("mode").style.display="block";
}

function nazad(){
  window.location.href="pocetna.html";
}

function nextLesson(){
  alert("Sljedeća lekcija uskoro 😄");
}

</script>

</body>
</html>
