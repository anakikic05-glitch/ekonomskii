<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lekcija 1</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
}

.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  background: rgba(255,255,255,0.05);
}

.btn {
  background: linear-gradient(135deg, #38bdf8, #6366f1);
  border: none;
  padding: 10px 20px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  margin: 5px;
}

.container {
  padding: 20px;
  max-width: 700px;
  margin: auto;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  margin-top: 20px;
}

.answers button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  transition: 0.2s;
}
.correct {
  background: #22c55e !important;
}

.wrong {
  background: #ef4444 !important;
}
.selected {
  background: #ef4444;
  opacity: 0.8;
}

.hidden {
  display: none;
}

.review {
  margin-top: 20px;
  text-align: left;
}

.review div {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="navbar">
  <button class="btn" onclick="nazad()">← Lekcije</button>
  <div>Lekcija 1</div>
</div>

<div class="container">

  <div id="mode">
    <h2>Izaberi način rada</h2>
    <button class="btn" onclick="start('test')">Test</button>
    <button class="btn" onclick="start('learn')">Učenje</button>
  </div>

  <div id="quiz" class="hidden">
    <div class="card">
      <h3 id="question"></h3>
      <div class="answers" id="answers"></div>
    </div>
    <button class="btn" onclick="next()">Sljedeće</button>
  </div>

  <div id="result" class="hidden">
    <h2 id="score"></h2>
    <div class="review" id="review"></div>
    <button class="btn" onclick="restart()">Ponovi</button>
    <button class="btn" onclick="nextLesson()">Sljedeća lekcija</button>
  </div>

</div>

<script>

let modeType = "";
let current = 0;
let score = 0;
let mistakes = [];


 const pitanja = [
  { p:"Tvorac specijalne i opšte teorije relativnosti bio je:", a:["Džon Neš","Albert Ajnštajn","Stiven Hoking","Isak Njutn"], t:1 },

  { p:"Kroz Prag protiče:", a:["Rajna","Sena","Volga","Vltava"], t:3 },

  { p:"Sloj atmosfere koji sadrži ozon i štiti nas od štetnog zračenja iz svemira naziva se:", a:["troposfera","stratosfera","jonosfera","mezosfera"], t:1 },

  { p:"Najveći živi kopneni sisar na planeti je:", a:["plavi kit","afrički slon","nosorog","polarni medvjed"], t:1 },

  { p:"Sistem kratkih i dugih zvučnih ili svjetlosnih znakova koji služe za prenos poruka na daljinu, a koji se najčešće koristi u radio-telegrafiji, naziva se:", a:["Morseova azbuka","Tele sistem","Esperanto sistem","Univerzalno pismo"], t:0 },

  { p:"Glavni grad Republike Srpske prema Ustavu Republike Srpske je:", a:["Banja Luka","Sarajevo","Istočno Sarajevo","Pale"], t:0 },

  { p:"Projekat Menhetn (eng the Manhattan Project) se odnosi na:", a:["izradu atomske bombe","redizajn Njujorka","izgradnju Statue Slobode","ništa od navedenog"], t:0 },

  { p:"Prirodni priraštaj stanovništva je:", a:["broj rođenih na 1000 stanovnika","broj umrlih na 1000 stanovnika","razlika između broja rođenih i broja umrlih","razlika između broja iseljenih i broja useljenih stanovnika"], t:2 },

  { p:"„Dajte mi dovoljno dugačku polugu i dobar oslonac i pomjeriću Zemlju“ rekao je:", a:["Platon","Aristotel","Pitagora","Arhimed"], t:3 },

  { p:"Sjedište Međunarodnog crvenog krsta je u:", a:["Parizu","Lozani","Ženevi","Strazburu"], t:2 },

  { p:"Sekularna država podrazumijeva:", a:[
    "vlast temeljenu na određenoj vjerskoj doktrini koja je spojena s državom",
    "vlast vršenu od strane poglavara čija je funkcija nasljedna i doživotna",
    "vlast u kojoj je religija odvojena od socijalnih i političkih aktivnosti države",
    "vlast u kojoj odluke direktno ili indirektno donosi većina njenih građana"
  ], t:2 },

  { p:"Srbija je, poslije srpsko-turskih ratova, 1878. godine dobila nezavisnost na:", a:["Rimskom kongresu","Bečkom kongresu","Pariskom kongresu","Berlinskom kongresu"], t:3 },

  { p:"Nobelova nagrada se dodjeljuje od novca koji je zarađen pronalaskom:", a:["penicilina","baruta","atomske bombe","dinamita"], t:3 },

  { p:"Naučnik koji je prvi izolovao penicilin iz gljive Penicillium notatum bio je:", a:["Luj Paster","Čarls Darvin","Aleksander Fleming","ništa od navedenog"], t:2 },

  { p:"Prestonica Grčke, Atina, dobila je naziv prema istoimenoj grčkoj boginji koja se smatrala:", a:["boginjom ljubavi","boginjom groma","boginjom mudrosti, ratovanja i zanata","ništa od navedenog"], t:2 },

  { p:"Trojanski rat opisan je u djelu pod nazivom:", a:["Odiseja","Ilijada","Ep o Gilgamešu","ništa od navedenog"], t:1 },

  { p:"OPEC je engleska skraćenica za organizaciju:", a:["nerazvijenih zemalja","bivših portugalskih kolonija","islamskih zemalja","zemalja izvoznica nafte"], t:3 },

  { p:"Retrospektivno znači:", a:["poštujući starije ljude","ići unaprijed","gledajući unazad","gledajući u budućnost"], t:2 },

  { p:"Prema dosadašnjim podacima, najstarije književno djelo za koje znamo je:", a:["Ilijada","Odiseja","Ep o Gilgamešu","Ništa od navedenog"], t:2 },

  { p:"Španija preko Gibraltara gleda u:", a:["Alžir","Maroko","Tunis","Libiju"], t:1 }
];
function start(m){
  modeType = m;
  document.getElementById("mode").style.display="none";
  document.getElementById("quiz").style.display="block";
  show();
}

function show(){
  let q = pitanja[current];
  document.getElementById("question").innerText = q.p;

  let ans = document.getElementById("answers");
  ans.innerHTML = "";

  q.izabrano = null;

  q.a.forEach((odg,i)=>{
    let btn = document.createElement("button");
    btn.innerText = odg;

    btn.onclick = () => {

  document.querySelectorAll(".answers button")
    .forEach(b => b.classList.remove("selected", "correct", "wrong"));

  btn.classList.add("selected");

  q.izabrano = i;

  // 🔥 SAMO ZA UČENJE MODE
  if (modeType === "learn") {

    if (i === q.t) {
      btn.classList.add("correct"); // zeleno
    } else {
      btn.classList.add("wrong"); // crveno

      // pokaži i tačan odgovor zeleno
      document.querySelectorAll(".answers button")[q.t]
        .classList.add("correct");
    }
  }
};

    ans.appendChild(btn);
  });
}

function next(){
  let q = pitanja[current];

  if(q.izabrano === q.t){
    score++;
  } else {
    mistakes.push({pitanje:q.p, tacan:q.a[q.t]});
  }

  current++;

  if(current < pitanja.length){
    show();
  } else {
    showResult();
  }
}

function showResult(){
  document.getElementById("quiz").style.display="none";
  document.getElementById("result").style.display="block";

  document.getElementById("score").innerText =
    "Rezultat: " + score + "/" + pitanja.length;

  let review = document.getElementById("review");
  review.innerHTML = "<h3>Greške:</h3>";

  if(mistakes.length === 0){
    review.innerHTML += "<p>Sve tačno 🎉</p>";
  } else {
    mistakes.forEach(m=>{
      review.innerHTML += `
        <div>
          <b>Pitanje:</b> ${m.pitanje}<br>
          <b>Tačan odgovor:</b> ${m.tacan}
        </div>
      `;
    });
  }
}

function restart(){
  current=0;
  score=0;
  mistakes=[];
  document.getElementById("result").style.display="none";
  document.getElementById("mode").style.display="block";
}

function nazad(){
  window.location.href="pocetna.html";
}

function nextLesson(){
  alert("Sljedeća lekcija uskoro 😄");
}

</script>

</body>
</html>
